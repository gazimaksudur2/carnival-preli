name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          REQUEST_TIMEOUT: "25"
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t queuestorm-team:ci .

      - name: Run container and smoke-test /health
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker run -d \
            --name queuestorm \
            -p 8000:8000 \
            -e LLM_PROVIDER=anthropic \
            -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            -e ANTHROPIC_MODEL=claude-sonnet-4-6 \
            queuestorm-team:ci

          # Wait for the server to be ready (up to 30 s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Server is up"
              break
            fi
            sleep 1
          done

          STATUS=$(curl -sf http://localhost:8000/health)
          echo "Health response: ${STATUS}"
          echo "${STATUS}" | grep -q '"status":"ok"'

          docker stop queuestorm

      - name: Post-test cleanup
        if: always()
        run: docker rm -f queuestorm || true
